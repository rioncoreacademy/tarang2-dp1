name: Publish Docker Image

on:
  push:
    branches: [master]
    paths:
      - Dockerfile
      - entrypoint.sh
      - chipcraft-run.sh
      - novnc-index.html
      - tools/chipcraft-key-init.sh
      - tools/chipcraft-tree.sh
      - tools/chipcraft-decrypt-all.sh
      - tools/chipcraft-sweep.sh
      - tools/chipcraft-crypt.vim

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/chipcraft:latest
